<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID G — A Verdade Sangrenta</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --blood: #c70000;
            --text: #c4c4c4;
            --bg: #020202;
            --brightness: 1;
            --contrast: 1;
        }
        body {
            font-family: 'Source Code Pro', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            position: relative;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            filter: brightness(var(--brightness)) contrast(var(--contrast));
            transition: filter 0.3s;
        }
        #bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 30%, #140404 0%, #000 65%),
                radial-gradient(ellipse at 70% 80%, #0a0101 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 7s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            from { filter: brightness(0.7) saturate(0.9); }
            to { filter: brightness(1) saturate(1.1); }
        }
        #scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
            opacity: 0.25;
            mix-blend-mode: overlay;
            transition: opacity 0.3s;
        }
        #fog {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.35;
            background: radial-gradient(circle at 15% 25%, rgba(200,0,0,0.08), transparent 45%),
                radial-gradient(circle at 85% 65%, rgba(200,0,0,0.05), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(80,0,0,0.04), transparent 70%);
            animation: fogMove 15s ease-in-out infinite alternate;
        }
        @keyframes fogMove {
            from { transform: scale(1) translate(-40px,-10px); opacity: 0.3; }
            to { transform: scale(1.2) translate(40px,20px); opacity: 0.4; }
        }
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            background: radial-gradient(circle, transparent 25%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.95) 100%);
            mix-blend-mode: multiply;
        }
        #flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(255,0,0,0.9), black);
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.03s ease;
        }
        #jumpscare-face {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0);
            font-size: 18rem;
            color: #ff0000;
            text-shadow: 0 0 60px red, 0 0 120px black;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.08s cubic-bezier(0.68,-0.55,0.27,1.55), opacity 0.08s;
            font-family: 'Creepster', cursive;
            text-align: center;
            line-height: 1;
        }
        #jumpscare-face.active {
            transform: translate(-50%,-50%) scale(1);
            opacity: 1;
        }
        #shadow-runner {
            position: fixed;
            bottom: 10%;
            left: -150px;
            width: 120px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.9) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #shadow-runner.sprint {
            animation: shadowSprint 1.2s ease-in forwards;
            opacity: 0.7;
        }
        @keyframes shadowSprint {
            0% { left: -150px; opacity: 0.2; }
            30% { opacity: 0.7; }
            100% { left: 110%; opacity: 0; }
        }
        #noise {
            position: fixed;
            inset: 0;
            opacity: 0.07;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: difference;
            transition: opacity 0.3s;
        }
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        #boot {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        #bootText {
            color: #ff2222;
            text-align: center;
            line-height: 2;
            letter-spacing: 3px;
            text-shadow: 0 0 15px red, 0 0 35px darkred;
            padding: 20px;
            font-size: 1.3rem;
            font-family: 'Source Code Pro', monospace;
        }
        #menu {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 2s ease;
        }
        #menu.visible { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        #menu h1 {
            font-family: 'Creepster', cursive;
            font-size: 6rem;
            color: #ff0a0a;
            text-shadow: 0 0 25px red, 0 0 60px darkred, 0 0 100px black;
            letter-spacing: 14px;
            animation: flickerTitle 3.5s infinite;
            margin-bottom: 0.1em;
        }
        @keyframes flickerTitle {
            0%,100% { opacity: 1; text-shadow: 0 0 25px red, 0 0 60px darkred; }
            25% { opacity: 0.7; text-shadow: 0 0 10px red, 0 0 30px darkred; }
            30% { opacity: 1; text-shadow: 0 0 45px red, 0 0 90px darkred; }
            55% { opacity: 0.3; text-shadow: 0 0 5px red; }
            58% { opacity: 0.9; text-shadow: 0 0 35px red; }
        }
        #menu #subtitle {
            margin-top: 0.5rem;
            color: #999;
            font-style: italic;
            letter-spacing: 3px;
            font-size: 1.1rem;
            font-family: 'Special Elite', cursive;
        }
        #menu #message {
            height: 55px;
            margin: 25px 0 10px;
            color: #ff3333;
            font-size: 1.3rem;
            text-shadow: 0 0 12px red;
            font-family: 'Creepster', cursive;
            letter-spacing: 2px;
            animation: msgGlow 2s infinite alternate;
        }
        @keyframes msgGlow {
            from { text-shadow: 0 0 8px red; }
            to { text-shadow: 0 0 25px red, 0 0 50px darkred; }
        }
        .id-container {
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #ccc;
        }
        .id-container label {
            font-family: 'Special Elite', cursive;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px red;
        }
        .id-container input {
            background: rgba(20,20,20,0.9);
            border: 1px solid #660000;
            color: #fff;
            padding: 10px 20px;
            font-family: 'Source Code Pro', monospace;
            font-size: 1.1rem;
            text-align: center;
            width: 250px;
            outline: none;
            transition: 0.3s;
        }
        .id-container input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px red;
        }
        .btn {
            display: block;
            margin: 12px auto;
            padding: 15px 30px;
            width: 280px;
            background: rgba(15,15,15,0.9);
            border: 1px solid #5a0000;
            color: #ddd;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            font-family: 'Source Code Pro', monospace;
            letter-spacing: 2px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.15), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover {
            background: #1f0000;
            box-shadow: 0 0 25px red, 0 0 55px darkred;
            transform: scale(1.04);
            color: white;
            border-color: #aa0000;
        }
        #game {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            flex-direction: column;
            height: 100vh;
            max-width: 850px;
            margin: auto;
            padding: 20px;
            justify-content: flex-end;
        }
        #game.visible { display: flex; }
        #gameTitle {
            display: none;
            margin: auto;
            text-align: center;
            animation: fadeIn 1.8s ease;
        }
        #gameTitle h1 {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            color: #ff2020;
            letter-spacing: 8px;
            text-shadow: 0 0 15px red, 0 0 40px red, 0 0 80px darkred;
            animation: flickerTitle 5s infinite;
        }
        #gameTitle .sub {
            margin-top: 10px;
            color: #aaa;
            font-style: italic;
            letter-spacing: 2px;
            font-family: 'Special Elite', cursive;
        }
        #dialog {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: flex-end;
            padding: 28px;
            margin-top: 20px;
            background: rgba(0,0,0,0.85);
            border-top: 3px solid #800000;
            backdrop-filter: blur(6px);
            border-radius: 4px 4px 0 0;
            box-shadow: 0 -5px 30px rgba(150,0,0,0.3);
            position: relative;
        }
        #dialog.visible { display: flex; }
        #name {
            color: #ff3b3b;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 0 0 12px red;
            font-family: 'Special Elite', cursive;
            letter-spacing: 3px;
        }
        #text {
            line-height: 1.9;
            white-space: pre-wrap;
            min-height: 130px;
            padding-left: 20px;
            border-left: 3px solid #6b0000;
            margin-bottom: 22px;
            font-size: 1.08rem;
            font-family: 'Source Code Pro', monospace;
            transition: color 0.2s;
            cursor: pointer;
        }
        #text.glitch-text { animation: textGlitch 0.2s infinite; }
        @keyframes textGlitch {
            0% { transform: translate(0); color: #ddd; }
            20% { transform: translate(-3px,2px); color: #ff5555; }
            40% { transform: translate(3px,-1px); color: #ff0000; }
            60% { transform: translate(-1px,-2px); color: #ddd; }
            80% { transform: translate(2px,1px); color: #ff4444; }
            100% { transform: translate(0); color: #ddd; }
        }
        #choices { display: flex; flex-direction: column; gap: 10px; }
        #choices button {
            padding: 14px 24px;
            background: rgba(18,18,18,0.9);
            border: 1px solid rgba(180,0,0,0.5);
            color: #e0e0e0;
            font-family: 'Source Code Pro', monospace;
            cursor: pointer;
            transition: 0.25s;
            text-align: left;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 2px;
        }
        #choices button:hover {
            transform: scale(1.02);
            background: rgba(40,0,0,0.85);
            box-shadow: 0 0 18px red, 0 0 50px darkred;
            border-color: #ff2222;
            color: white;
        }
        .shake { animation: shake 0.12s infinite; }
        @keyframes shake {
            0% { transform: translate(3px,2px); }
            25% { transform: translate(-3px,-2px); }
            50% { transform: translate(3px,-1px); }
            75% { transform: translate(-2px,3px); }
            100% { transform: translate(2px,-2px); }
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid #660000;
            padding: 25px;
            width: 450px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #ddd;
            font-family: 'Source Code Pro', monospace;
            box-shadow: 0 0 40px rgba(255,0,0,0.4);
        }
        .modal-content h2 {
            color: #ff3333;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Creepster', cursive;
            letter-spacing: 4px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            border-bottom: 1px solid #330000;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .setting-item label { font-family: 'Special Elite', cursive; letter-spacing: 1px; flex: 1; }
        .setting-item input[type="range"] { width: 130px; }
        .setting-item input[type="checkbox"] { transform: scale(1.3); accent-color: red; margin-left: 10px; }
        .setting-item span { margin-left: 5px; font-size: 0.9rem; color: #aaa; }
        .close-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #330000;
            border: 1px solid red;
            color: white;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        .close-btn:hover { background: #660000; }
        @media (max-width: 600px) {
            #menu h1 { font-size: 3.5rem; letter-spacing: 8px; }
            #gameTitle h1 { font-size: 2.4rem; }
            #text { font-size: 0.9rem; min-height: 90px; }
            .btn { width: 90%; }
            #jumpscare-face { font-size: 10rem; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>
    <canvas id="noise"></canvas>
    <canvas id="particles"></canvas>
    <div id="scanlines"></div>
    <div id="fog"></div>
    <div id="vignette"></div>
    <div id="flash"></div>
    <div id="jumpscare-face">☠️</div>
    <div id="shadow-runner"></div>

    <div id="boot"><div id="bootText"></div></div>

    <div id="menu">
        <h1>A verdade Sangrenta</h1>
        <div id="subtitle">O vazio nunca esteve tão cheio</div>
        <div id="message"></div>
        <div class="id-container">
            <label>ID DO SOBREVIVENTE</label>
            <input type="text" id="playerIdInput" placeholder="EX: SOBREVIVENTE_01" maxlength="20">
        </div>
        <button class="btn" id="newGame">▶ NOVO JOGO</button>
        <button class="btn" id="continueBtn">↻ CONTINUAR</button>
        <button class="btn" id="configBtn">⚙ CONFIGURAÇÕES</button>
        <div style="margin-top:30px; color:#660000; font-family:'Special Elite',cursive; letter-spacing:3px;">by: VoidG</div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>CONFIGURAÇÕES</h2>
            <div class="setting-item"><label for="brightnessRange">Brilho</label><input type="range" id="brightnessRange" min="0.5" max="1.5" step="0.1" value="1"><span id="brightnessVal">1.0</span></div>
            <div class="setting-item"><label for="contrastRange">Contraste</label><input type="range" id="contrastRange" min="0.7" max="1.5" step="0.1" value="1"><span id="contrastVal">1.0</span></div>
            <div class="setting-item"><label for="speedRange">Velocidade da escrita</label><input type="range" id="speedRange" min="10" max="60" step="5" value="30"><span id="speedVal">30</span></div>
            <div class="setting-item"><label for="glitchFreqRange">Frequência de glitches</label><input type="range" id="glitchFreqRange" min="0" max="10" step="1" value="5"><span id="glitchFreqVal">5</span></div>
            <div class="setting-item"><label for="volumeRange">Volume (simulado)</label><input type="range" id="volumeRange" min="0" max="100" step="5" value="80"><span id="volumeVal">80%</span></div>
            <div class="setting-item"><label for="jumpscareToggle">Jumpscares</label><input type="checkbox" id="jumpscareToggle" checked></div>
            <div class="setting-item"><label for="glitchToggle">Glitches de texto</label><input type="checkbox" id="glitchToggle" checked></div>
            <div class="setting-item"><label for="shadowToggle">Sombras corredoras</label><input type="checkbox" id="shadowToggle" checked></div>
            <div class="setting-item"><label for="scanlinesToggle">Linhas de varredura</label><input type="checkbox" id="scanlinesToggle" checked></div>
            <div class="setting-item"><label for="particlesToggle">Partículas (cinzas)</label><input type="checkbox" id="particlesToggle" checked></div>
            <button class="close-btn" id="closeSettings">FECHAR E SALVAR</button>
        </div>
    </div>

    <div id="game">
        <div id="gameTitle">
            <h1>Vazio</h1>
            <div class="sub">Capítulo I — O Último Sinal</div>
        </div>
        <div id="dialog">
            <div id="name">SISTEMA</div>
            <div id="text">Carregando...</div>
            <div id="choices"></div>
        </div>
    </div>

    <script>
        (function() {
            const bootDiv = document.getElementById("boot");
            const bootTextEl = document.getElementById("bootText");
            const menu = document.getElementById("menu");
            const messageEl = document.getElementById("message");
            const flash = document.getElementById("flash");
            const jumpscareFace = document.getElementById("jumpscare-face");
            const shadowRunner = document.getElementById("shadow-runner");
            const gameEl = document.getElementById("game");
            const gameTitleEl = document.getElementById("gameTitle");
            const dialogEl = document.getElementById("dialog");
            const nameEl = document.getElementById("name");
            const textEl = document.getElementById("text");
            const choicesEl = document.getElementById("choices");
            const body = document.body;
            const playerIdInput = document.getElementById("playerIdInput");
            const settingsModal = document.getElementById("settingsModal");

            const brightnessRange = document.getElementById("brightnessRange");
            const contrastRange = document.getElementById("contrastRange");
            const speedRange = document.getElementById("speedRange");
            const glitchFreqRange = document.getElementById("glitchFreqRange");
            const volumeRange = document.getElementById("volumeRange");
            const jumpscareToggle = document.getElementById("jumpscareToggle");
            const glitchToggle = document.getElementById("glitchToggle");
            const shadowToggle = document.getElementById("shadowToggle");
            const scanlinesToggle = document.getElementById("scanlinesToggle");
            const particlesToggle = document.getElementById("particlesToggle");
            const brightnessVal = document.getElementById("brightnessVal");
            const contrastVal = document.getElementById("contrastVal");
            const speedVal = document.getElementById("speedVal");
            const glitchFreqVal = document.getElementById("glitchFreqVal");
            const volumeVal = document.getElementById("volumeVal");

            let typewriterTimer = null;
            let isTyping = false;
            let currentPlayerId = 'SOBREVIVENTE_01';

            let settings = {
                brightness: 1, contrast: 1, typewriterSpeed: 30,
                glitchFrequency: 5, volume: 80,
                jumpscaresEnabled: true, glitchesEnabled: true,
                shadowsEnabled: true, scanlinesEnabled: true, particlesEnabled: true
            };

            function loadSettings() {
                const saved = localStorage.getItem('voidG_settings');
                if (saved) { try { const data = JSON.parse(saved); settings = { ...settings, ...data }; } catch (e) {} }
                applySettings();
            }
            function saveSettings() {
                localStorage.setItem('voidG_settings', JSON.stringify(settings));
                applySettings();
            }
            function applySettings() {
                body.style.setProperty('--brightness', settings.brightness);
                body.style.setProperty('--contrast', settings.contrast);
                brightnessRange.value = settings.brightness; contrastRange.value = settings.contrast;
                speedRange.value = settings.typewriterSpeed; glitchFreqRange.value = settings.glitchFrequency;
                volumeRange.value = settings.volume;
                jumpscareToggle.checked = settings.jumpscaresEnabled;
                glitchToggle.checked = settings.glitchesEnabled;
                shadowToggle.checked = settings.shadowsEnabled;
                scanlinesToggle.checked = settings.scanlinesEnabled;
                particlesToggle.checked = settings.particlesEnabled;
                brightnessVal.textContent = settings.brightness.toFixed(1);
                contrastVal.textContent = settings.contrast.toFixed(1);
                speedVal.textContent = settings.typewriterSpeed;
                glitchFreqVal.textContent = settings.glitchFrequency;
                volumeVal.textContent = settings.volume + '%';
                document.getElementById('scanlines').style.opacity = settings.scanlinesEnabled ? '0.25' : '0';
                document.getElementById('particles').style.opacity = settings.particlesEnabled ? '0.6' : '0';
            }
            function updateSettingDisplay() {
                brightnessVal.textContent = brightnessRange.value;
                contrastVal.textContent = contrastRange.value;
                speedVal.textContent = speedRange.value;
                glitchFreqVal.textContent = glitchFreqRange.value;
                volumeVal.textContent = volumeRange.value + '%';
            }
            [brightnessRange, contrastRange, speedRange, glitchFreqRange, volumeRange].forEach(input => {
                input.addEventListener('input', updateSettingDisplay);
            });
            loadSettings();

            document.getElementById('configBtn').addEventListener('click', () => { settingsModal.classList.add('active'); });
            document.getElementById('closeSettings').addEventListener('click', () => {
                settings.brightness = parseFloat(brightnessRange.value);
                settings.contrast = parseFloat(contrastRange.value);
                settings.typewriterSpeed = parseInt(speedRange.value);
                settings.glitchFrequency = parseInt(glitchFreqRange.value);
                settings.volume = parseInt(volumeRange.value);
                settings.jumpscaresEnabled = jumpscareToggle.checked;
                settings.glitchesEnabled = glitchToggle.checked;
                settings.shadowsEnabled = shadowToggle.checked;
                settings.scanlinesEnabled = scanlinesToggle.checked;
                settings.particlesEnabled = particlesToggle.checked;
                saveSettings();
                settingsModal.classList.remove('active');
            });

            function getSaveKey(id) { return `voidG_save_${id}`; }
            function setCurrentPlayerId(id) {
                currentPlayerId = id || 'SOBREVIVENTE_01';
                playerIdInput.value = currentPlayerId;
                localStorage.setItem('voidG_lastId', currentPlayerId);
            }
            const lastId = localStorage.getItem('voidG_lastId');
            if (lastId) setCurrentPlayerId(lastId); else setCurrentPlayerId('SOBREVIVENTE_01');
            playerIdInput.addEventListener('input', () => {
                currentPlayerId = playerIdInput.value.trim() || 'SOBREVIVENTE_01';
                localStorage.setItem('voidG_lastId', currentPlayerId);
            });

            const bootLines = [
                "CONECTANDO...", "", "SINAL ENCONTRADO", "",
                "LOCALIZAÇÃO: SETOR 7 — ESTAÇÃO VOID G", "DATA: [CORROMPIDA]", "",
                "SOBREVIVENTES CONFIRMADOS: 0", "", "VOCÊ É O ÚNICO SINAL ATIVO", "",
                "INICIANDO PROTOCOLO VOID G..."
            ];
            let bootIndex = 0;
            function runBootSequence() {
                if (bootIndex < bootLines.length) {
                    bootTextEl.innerHTML += bootLines[bootIndex] + "<br>";
                    bootIndex++;
                    setTimeout(runBootSequence, 350 + Math.random() * 700);
                } else {
                    setTimeout(() => { bootDiv.style.display = "none"; menu.classList.add("visible"); startMenuMessages(); }, 2200);
                }
            }
            runBootSequence();

            const noiseCanvas = document.getElementById("noise");
            const noiseCtx = noiseCanvas.getContext("2d");
            function resizeNoise() { noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
            resizeNoise(); window.addEventListener("resize", resizeNoise);
            function drawNoise() {
                const img = noiseCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
                const data = img.data;
                for (let i = 0; i < data.length; i += 4) { const v = Math.random() * 255; data[i] = v; data[i+1] = v; data[i+2] = v; data[i+3] = 22; }
                noiseCtx.putImageData(img, 0, 0);
                requestAnimationFrame(drawNoise);
            }
            drawNoise();

            const particlesCanvas = document.getElementById("particles");
            const particlesCtx = particlesCanvas.getContext("2d");
            let particles = [];
            function resizeParticles() { particlesCanvas.width = window.innerWidth; particlesCanvas.height = window.innerHeight; }
            resizeParticles(); window.addEventListener("resize", () => { resizeParticles(); initParticles(); });
            function initParticles() {
                particles = [];
                const count = Math.floor((particlesCanvas.width * particlesCanvas.height) / 18000);
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * particlesCanvas.width, y: Math.random() * particlesCanvas.height,
                        size: Math.random() * 1.8 + 0.5, speedX: (Math.random() - 0.5) * 0.25,
                        speedY: -Math.random() * 0.6 - 0.15, opacity: Math.random() * 0.5 + 0.2,
                        life: Math.random() * 300 + 100, maxLife: 400
                    });
                }
            }
            initParticles();
            function drawParticles() {
                particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.speedX; p.y += p.speedY; p.life--;
                    if (p.life <= 0 || p.y < -10) { p.x = Math.random() * particlesCanvas.width; p.y = particlesCanvas.height + 10; p.life = p.maxLife; }
                    const alpha = p.opacity * Math.min(p.life / 100, 1);
                    particlesCtx.fillStyle = `rgba(180,180,180,${alpha})`;
                    particlesCtx.beginPath(); particlesCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); particlesCtx.fill();
                }
                requestAnimationFrame(drawParticles);
            }

            function getNextSceneId(choice) {
                if (typeof choice.next === 'function') return choice.next();
                if (choice.condition && !choice.condition()) return choice.failNext || gameState.currentScene;
                if (choice.effect) choice.effect();
                return choice.next;
            }

            function typewriterEffect(element, text, speed, onComplete) {
                let index = 0; element.textContent = ''; isTyping = true;
                function type() {
                    if (index < text.length) {
                        element.textContent += text.charAt(index); index++;
                        let delay = speed + (Math.random() * 8 - 4);
                        if (settings.glitchesEnabled && Math.random() < (settings.glitchFrequency / 20)) { element.textContent += '█'; setTimeout(() => { element.textContent = element.textContent.slice(0, -1); }, 70); delay = 100; }
                        if (settings.glitchesEnabled && Math.random() < (settings.glitchFrequency / 30)) { element.classList.add('glitch-text'); setTimeout(() => element.classList.remove('glitch-text'), 100); }
                        typewriterTimer = setTimeout(type, delay);
                    } else { isTyping = false; if (onComplete) onComplete(); }
                }
                type();
            }

            function finishTyping() {
                if (isTyping && typewriterTimer) { clearTimeout(typewriterTimer); isTyping = false; const scene = scenes[gameState.currentScene]; if (scene) { textEl.textContent = scene.text; if (choicesEl.children.length === 0 && scene.choices && scene.choices.length > 0) renderChoices(scene); } }
            }

            function renderChoices(scene) {
                choicesEl.innerHTML = '';
                if (scene.choices && scene.choices.length > 0) {
                    scene.choices.forEach(choice => {
                        if (choice.condition && !choice.condition()) return;
                        const btn = document.createElement('button');
                        btn.textContent = choice.text;
                        btn.addEventListener('click', () => { const nextId = getNextSceneId(choice); if (nextId) renderScene(nextId); });
                        choicesEl.appendChild(btn);
                    });
                }
            }

            function renderScene(sceneId) {
                if (isTyping && typewriterTimer) { clearTimeout(typewriterTimer); isTyping = false; }
                let actualSceneId = sceneId;
                if (typeof scenes[sceneId]?.condition === 'function' && !scenes[sceneId].condition()) actualSceneId = 'start';
                const scene = scenes[actualSceneId];
                if (!scene) return;
                gameState.currentScene = actualSceneId; gameState.history.push(actualSceneId); saveGame();
                nameEl.textContent = scene.name || "???";
                textEl.classList.remove("glitch-text"); choicesEl.innerHTML = '';
                if (scene.onEnter) scene.onEnter();
                if (gameState.jumpscareCooldown <= 0 && Math.random() < 0.08 && actualSceneId !== 'start') { triggerJumpscare(); gameState.jumpscareCooldown = 3; }
                if (gameState.jumpscareCooldown > 0) gameState.jumpscareCooldown--;
                const speed = settings.typewriterSpeed;
                typewriterEffect(textEl, scene.text, speed, () => { renderChoices(scene); });
            }

            textEl.addEventListener('click', () => { if (isTyping) finishTyping(); });

            function startGame(isNew) {
                const id = currentPlayerId;
                if (!id) { alert("Por favor, insira uma identificação de sobrevivente."); return; }
                if (isNew) { clearSave(); } else { const loaded = loadGame(id); if (!loaded) { alert("Nenhum progresso encontrado para o ID " + id + ". Iniciando novo jogo."); clearSave(); } }
                menu.classList.remove('visible'); if (msgInterval) clearInterval(msgInterval);
                gameEl.classList.add('visible'); gameTitleEl.style.display = 'block'; dialogEl.classList.remove('visible');
                setTimeout(() => { gameTitleEl.style.display = 'none'; dialogEl.classList.add('visible'); renderScene(gameState.currentScene || 'start'); }, 2800);
            }

            document.getElementById('newGame').addEventListener('click', () => startGame(true));
            document.getElementById('continueBtn').addEventListener('click', () => startGame(false));
